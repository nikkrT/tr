syntax = "proto3";

package order;

option go_package = "github.com/nikkrT/tr/pkg/orderService";

service OrderService {
  rpc CreateOrder (OrderRequest) returns (OrderAnswer);
}

message OrderRequest {
  uint32 id = 1;
  uint32 quantity = 2;
}

message OrderAnswer {
  uint32 order_id = 1;
  bool success = 2;
}